<!doctype html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Become a Partner | ACSP</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f98c06",
                        background: "#fcf9f6",
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-[#fcf9f6] text-[#1a140e]">
    <div id="navbar-placeholder"></div>
    <main class="pt-32 pb-20 px-6 min-h-screen">
        <div class="max-w-3xl mx-auto">
            <div class="text-center mb-12">
                <span class="text-[0.75rem] font-black tracking-[0.2em] uppercase text-primary mb-4 block">Collaboration for Compassion</span>
                <h1 class="text-[3rem] font-black tracking-tighter leading-none mb-4">Become a Partner</h1>
                <p class="text-lg text-stone-600 max-w-xl mx-auto">Join our ecosystem of guardians. Together, we can scale impact and ensure every animal finds a safe haven.</p>
            </div>

            <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12 border border-primary/5">
                <form id="ngo-register-form" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="col-span-full">
                            <label class="text-[0.75rem] font-black uppercase text-stone-500 mb-2 block">Organization Name</label>
                            <input name="name" required class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" placeholder="e.g. Hope For Paws" />
                        </div>
                        <div>
                            <label class="text-[0.75rem] font-black uppercase text-stone-500 mb-2 block">Registration ID</label>
                            <input name="registrationId" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" placeholder="REG-XXXXXX" />
                        </div>
                        <div>
                            <label class="text-[0.75rem] font-black uppercase text-stone-500 mb-2 block">Established Date</label>
                            <input name="establishedDate" type="date" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                        </div>
                    </div>

                    <div class="space-y-6 pt-4 border-t border-slate-100">
                        <h3 class="text-xl font-extrabold">Location Details</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="col-span-full">
                                <input name="address" placeholder="Full Address" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                            </div>
                            <input name="city" placeholder="City" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                            <input name="country" placeholder="Country" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                        </div>
                    </div>

                    <div class="space-y-6 pt-4 border-t border-slate-100">
                        <h3 class="text-xl font-extrabold">Contact Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input name="phone" placeholder="Phone Number" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                            <input name="email" placeholder="Email Address" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                            <div class="col-span-full">
                                <input name="website" placeholder="Website URL (https://...)" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6 pt-4 border-t border-slate-100">
                        <h3 class="text-xl font-extrabold">Services</h3>
                        <input name="services" placeholder="Rescue, Medical, Adoption (comma separated)" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                    </div>

                    <div class="space-y-6 pt-4 border-t border-slate-100">
                        <h3 class="text-xl font-extrabold">Impact Statistics</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <input name="animalsRescued" type="number" placeholder="Rescued Count" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                            <input name="successfulAdoptions" type="number" placeholder="Adoptions Count" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                            <input name="activeVolunteers" type="number" placeholder="Volunteer Count" class="w-full bg-slate-50 border-none rounded-full px-6 py-4 focus:ring-2 focus:ring-primary" />
                        </div>
                    </div>

                    <div class="pt-4">
                        <label class="text-[0.75rem] font-black uppercase text-stone-500 mb-2 block">Upload Gallery Photos (Max 10)</label>
                        <input type="file" name="gallery" multiple class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20" />
                    </div>

                    <div class="pt-6">
                        <button class="w-full bg-primary text-white py-5 rounded-full text-lg font-black tracking-tight shadow-xl shadow-primary/20 hover:-translate-y-1 transition-all" type="submit">Submit Partnership Request</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="components.js"></script>
    <script>
        document.getElementById('ngo-register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Registering...';

            const formData = new FormData(e.target);
            const payload = new FormData();
            
            payload.append('name', formData.get('name'));
            payload.append('registrationId', formData.get('registrationId'));
            payload.append('establishedDate', formData.get('establishedDate'));
            
            payload.append('location', JSON.stringify({
                address: formData.get('address'),
                city: formData.get('city'),
                country: formData.get('country')
            }));
            
            payload.append('contact', JSON.stringify({
                phone: formData.get('phone'),
                email: formData.get('email'),
                website: formData.get('website')
            }));
            
            const services = formData.get('services').split(',').map(s => s.trim()).filter(Boolean);
            services.forEach(s => payload.append('services', s));
            
            payload.append('impact', JSON.stringify({
                animalsRescued: parseInt(formData.get('animalsRescued')) || 0,
                successfulAdoptions: parseInt(formData.get('successfulAdoptions')) || 0,
                activeVolunteers: parseInt(formData.get('activeVolunteers')) || 0
            }));

            const files = formData.getAll('gallery');
            files.forEach(file => payload.append('gallery', file));

            try {
                const response = await fetch('http://localhost:5000/api/ngo', {
                    method: 'POST',
                    body: payload
                });
                if (response.ok) {
                    alert('NGO Registered Successfully!');
                    window.location.href = 'directory.html';
                } else {
                    const err = await response.json();
                    alert(err.message);
                }
            } catch (error) {
                alert('Error connecting to server');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit Partnership Request';
            }
        });
    </script>
</body>
</html>

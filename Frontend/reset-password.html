<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ACSP - Reset Password</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f98c06",
                        "background-light": "#fcf9f6",
                        "background-dark": "#211811",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }</script>
        <! comment >

    </style>
    <link href="css/style.css" rel="stylesheet" />
</head>

<body class="bg-background-light dark:bg-background-dark text-[#0e1b12] dark:text-white min-h-screen flex flex-col">

    <main class="flex-1 flex flex-col items-center justify-center px-4 py-12 md:py-20">
        <div
            class="w-full max-w-[480px] bg-white dark:bg-[#2e231a] p-8 md:p-12 rounded-xl shadow-sm border border-[#f3ebe7] dark:border-[#3a281e]">
            <!-- Icon & Header -->
            <div class="flex flex-col items-center text-center mb-8">
                <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-6">
                    <span class="material-symbols-outlined text-primary text-3xl">lock_reset</span>
                </div>
                <h1 class="text-2xl md:text-3xl font-bold tracking-tight mb-3">Set New Password</h1>
                <p class="text-neutral-600 dark:text-neutral-400 text-base leading-relaxed">
                    Enter your new password below to complete the reset process.
                </p>
            </div>
            <form id="resetPasswordForm" class="space-y-6">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-[#0e1b12] dark:text-neutral-200 ml-1" for="newPassword">
                        New Password
                    </label>
                    <div class="relative">
                        <input
                            class="flex w-full rounded-full border border-[#e7ddd7] dark:border-[#4a362d] bg-[#fcf9f8] dark:bg-[#211811] h-14 px-6 pr-12 text-base focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-[#97674e]/60"
                            id="newPassword" name="newPassword" placeholder="••••••••" required="" type="password" />
                        <button type="button" id="toggleNewPassword"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-[#97674e]/60 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-lg">visibility</span>
                        </button>
                    </div>
                    <p class="text-xs text-neutral-500 dark:text-neutral-400 ml-1">
                        Must be at least 8 characters long
                    </p>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-[#0e1b12] dark:text-neutral-200 ml-1" for="confirmPassword">
                        Confirm New Password
                    </label>
                    <div class="relative">
                        <input
                            class="flex w-full rounded-full border border-[#e7ddd7] dark:border-[#4a362d] bg-[#fcf9f8] dark:bg-[#211811] h-14 px-6 pr-12 text-base focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-[#97674e]/60"
                            id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password" />
                        <button type="button" id="toggleConfirmPassword"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-[#97674e]/60 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-lg">visibility</span>
                        </button>
                    </div>
                </div>
                <div class="pt-2">
                    <button id="resetPasswordBtn"
                        class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-full text-base transition-transform active:scale-[0.98] shadow-lg shadow-primary/20 flex items-center justify-center gap-2"
                        type="submit">
                        <span>Reset Password</span>
                        <span class="material-symbols-outlined text-xl">key</span>
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center">
                <a class="inline-flex items-center gap-2 text-neutral-600 dark:text-neutral-400 hover:text-primary dark:hover:text-primary font-medium transition-colors group"
                    href="login.html">
                    <span
                        class="material-symbols-outlined text-lg transition-transform group-hover:-translate-x-1">arrow_back</span>
                    <span>Back to Login</span>
                </a>
            </div>
        </div>

        <div class="mt-8 text-center text-xs text-neutral-500 dark:text-neutral-500 max-w-[400px]">
            <p><a class="underline hover:text-primary transition-colors" href="#"></a></p>
        </div>
    </main>

    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[30%] h-[30%] bg-primary/10 rounded-full blur-3xl"></div>
    </div>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ACSP - NGO Directory</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f98c06",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112116",
                    },
                },
            },
        }
    </script>
    <link href="css/style.css" rel="stylesheet" />
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-[#0e1b12] dark:text-white antialiased transition-colors duration-300">
    <div id="navbar-placeholder"></div>

    <main class="flex-1 w-full max-w-[1200px] mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div class="max-w-2xl">
                <h1 class="text-5xl font-black tracking-tight mb-4">NGO Directory</h1>
                <p class="text-lg text-black/60 dark:text-white/60 leading-relaxed">
                    Find and support local animal welfare organizations across the country.
                </p>
            </div>
            <button onclick="window.location.href='become_partner.html'" class="flex items-center gap-2 px-6 py-3 bg-white dark:bg-white/5 border border-primary/20 rounded-full font-bold text-sm hover:border-primary transition-all group">
                <span>Become a Partner</span>
                <span class="material-symbols-outlined text-primary group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </button>
        </div>

        <!-- NGO Grid -->
        <div id="ngo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-primary border-t-transparent mx-auto"></div>
                <p class="mt-4 text-slate-500">Loading organizations...</p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('ngo-grid');
            try {
                const response = await fetch('http://localhost:5000/api/ngos');
                const ngos = await response.json();
                
                if (ngos.length === 0) {
                    grid.innerHTML = `<p class="col-span-full text-center text-slate-500 py-20">No NGOs found.</p>`;
                    return;
                }

                grid.innerHTML = ngos.map(ngo => `
                    <div class="group flex flex-col bg-white dark:bg-white/5 rounded-3xl border border-transparent hover:border-primary/30 transition-all hover:shadow-2xl hover:shadow-primary/5 overflow-hidden">
                        <div class="relative h-48 w-full overflow-hidden bg-slate-100">
                            <img alt="${ngo.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" 
                                 src="${ngo.gallery && ngo.gallery.length > 0 ? 'http://localhost:5000/' + ngo.gallery[0].replace(/\\/g, '/') : 'https://images.unsplash.com/photo-1548191265-cc70d3d45ba1?auto=format&fit=crop&q=80&w=800'}" />
                        </div>
                        <div class="p-6 flex flex-col flex-1">
                            <div class="flex items-start justify-between mb-4">
                                <div class="size-16 rounded-2xl bg-background-light dark:bg-background-dark border-4 border-white dark:border-background-dark -mt-14 relative z-10 overflow-hidden shadow-lg flex items-center justify-center">
                                    <span class="material-symbols-outlined text-primary text-3xl">apartment</span>
                                </div>
                            </div>
                            <h3 class="text-xl font-bold mb-2 group-hover:text-primary transition-colors">${ngo.name}</h3>
                            <div class="flex items-center gap-1.5 text-sm text-black/60 dark:text-white/60 mb-4">
                                <span class="material-symbols-outlined text-primary text-lg">location_on</span>
                                <span>${ngo.location.city}, ${ngo.location.country}</span>
                            </div>
                            <div class="flex flex-wrap gap-2 mb-8">
                                ${ngo.services.slice(0, 2).map(s => `<span class="px-3 py-1 bg-primary/10 text-primary text-xs font-bold rounded-full border border-primary/20">${s}</span>`).join('')}
                            </div>
                            <div class="mt-auto grid grid-cols-2 gap-3">
                                <button onclick="window.location.href='ngo-profile.html?id=${ngo._id}'" class="h-11 rounded-full border border-black/10 dark:border-white/10 text-sm font-bold hover:bg-black/5 dark:hover:bg-white/5 transition-colors">View Profile</button>
                                <button onclick="window.location.href='donation.html'" class="h-11 rounded-full bg-primary text-background-dark text-sm font-bold hover:shadow-lg transition-all">Support</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-500 py-20">Error connecting to backend.</p>`;
            }
        });
    </script>
</body>
</html>

<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ember Orchard - Animal Adoption Listings</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#51453a",
              "on-error-container": "#410009",
              surface: "#fcf9f6",
              primary: "#f98c06",
              "on-secondary-fixed-variant": "#584400",
              "inverse-surface": "#362f29",
              "surface-container-highest": "#ebe8e5",
              "error-container": "#ffdad9",
              "tertiary-container": "#93f7b8",
              "on-tertiary-fixed": "#00210f",
              "tertiary-fixed": "#93f7b8",
              "surface-container-lowest": "#ffffff",
              "on-background": "#1a140e",
              "surface-dim": "#e5e2df",
              "surface-bright": "#ffffff",
              "secondary-fixed": "#ffe08d",
              "on-primary-container": "#321300",
              "primary-fixed-dim": "#ffb68e",
              "primary-fixed": "#ffdbc0",
              "on-tertiary-fixed-variant": "#00522d",
              "on-error": "#ffffff",
              "inverse-on-surface": "#fcf0e4",
              "surface-container-low": "#fcf9f6",
              "on-primary-fixed": "#321300",
              "surface-tint": "#f98c06",
              "primary-container": "#ffdbc0",
              "outline-variant": "#d4c4b5",
              "secondary-fixed-dim": "#e9c44a",
              "secondary-container": "#ffe08d",
              secondary: "#745b00",
              "on-primary-fixed-variant": "#7c3700",
              "on-tertiary": "#ffffff",
              "on-secondary-container": "#241a00",
              "on-tertiary-container": "#00210f",
              "surface-container-high": "#f0edea",
              tertiary: "#006d3e",
              "tertiary-fixed-dim": "#77da9e",
              "on-primary": "#ffffff",
              error: "#e11d48",
              "inverse-primary": "#ffb68e",
              outline: "#837569",
              "surface-variant": "#f4e0d0",
              "surface-container": "#f6f3f0",
              "on-secondary": "#ffffff",
              "on-surface": "#1a140e",
              background: "#fcf9f6",
              "on-secondary-fixed": "#241a00",
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Inter"],
              body: ["Inter"],
              label: ["Inter"],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: #fcf9f6;
        color: #1a140e;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface min-h-screen pb-32">
    <!-- TopAppBar -->
    <div id="navbar-placeholder"></div>
    <!-- Main Content Canvas -->
    <main class="max-w-7xl mx-auto px-6 pt-24">
      <!-- Header Section -->
      <header class="py-12">
        <h1 class="text-[3rem] font-black tracking-tight leading-none mb-4">
          Find your new companion.
        </h1>
        <p class="text-on-surface-variant text-lg max-w-2xl leading-relaxed">
          Browse our curated list of pets looking for their forever homes. Every
          animal is vetted, loved, and waiting for a second chance.
        </p>
      </header>
      <!-- Search & Filter Cluster -->
      <div class="mb-12 flex flex-wrap gap-4 items-center">
        <div
          class="flex-grow bg-white rounded-full shadow-sm border border-on-surface-variant/10 flex items-center px-6 py-3">
          <span class="material-symbols-outlined text-stone-400 mr-3"
            >search</span
          >
          <input
            class="bg-transparent border-none focus:ring-0 w-full text-sm font-medium"
            placeholder="Search breeds, ages, or locations..."
            type="text" />
        </div>
        <button
          class="bg-white rounded-full px-6 py-3 shadow-sm border border-on-surface-variant/10 flex items-center gap-2 hover:-translate-y-1 transition-all">
          <span class="material-symbols-outlined text-[18px]">tune</span>
          <span class="text-[12px] font-black uppercase tracking-widest"
            >Filter</span
          >
        </button>
      </div>
      <div class="mb-12 flex justify-center">
        <a
          href="adoption_form.html"
          class="bg-primary text-white rounded-full px-12 py-5 font-black uppercase tracking-[0.2em] text-[14px] shadow-xl hover:scale-105 hover:-translate-y-1 transition-all duration-300 active:scale-95 flex items-center gap-3">
          <span class="material-symbols-outlined">add_circle</span>
          Post for Adoption
        </a>
      </div>
      <!-- Adoption Grid -->
      <div id="adoptionGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Dynamic content will be injected here -->
      </div>
      </div>
      <div class="mt-16 flex justify-center w-full">
        <button
          id="loadMoreBtn"
          class="bg-primary text-white rounded-full px-12 py-5 font-black uppercase tracking-[0.2em] text-[14px] shadow-xl hover:scale-105 hover:-translate-y-1 transition-all duration-300 active:scale-95 flex items-center gap-3">
          <span class="material-symbols-outlined">expand_more</span>
          Load more companion
        </button>
      </div>
    </main>
    <!-- BottomNavBar -->
    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script>
      let currentPage = 1;

      async function fetchAdoptions(page = 1) {
        try {
          const response = await fetch(`http://localhost:5000/adoptions?page=${page}`);
          const data = await response.json();
          
          if (page === 1) {
            document.getElementById('adoptionGrid').innerHTML = '';
          }

          data.adoptions.forEach(adoption => {
            const card = createAdoptionCard(adoption);
            document.getElementById('adoptionGrid').appendChild(card);
          });

          if (data.currentPage >= data.totalPages) {
            document.getElementById('loadMoreBtn').classList.add('hidden');
          } else {
            document.getElementById('loadMoreBtn').classList.remove('hidden');
          }
        } catch (error) {
          console.error('Error fetching adoptions:', error);
        }
      }

      function createAdoptionCard(adoption) {
        const div = document.createElement('div');
        div.className = 'group bg-surface-container-lowest rounded-xl shadow-sm hover:shadow-xl transition-all duration-500 hover:-translate-y-2 overflow-hidden flex flex-col';
        
        const photoUrl = adoption.photos && adoption.photos.length > 0 
          ? `http://localhost:5000/${adoption.photos[0]}` 
          : 'https://images.unsplash.com/photo-1543466835-00a7927eba01?q=80&w=1000&auto=format&fit=crop';

        div.innerHTML = `
          <div class="relative h-72 overflow-hidden">
            <img class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" src="${photoUrl}" alt="${adoption.name}">
            <div class="absolute top-4 left-4 flex gap-2">
              <span class="bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider">${adoption.status}</span>
            </div>
            <button class="absolute top-4 right-4 bg-white/90 backdrop-blur-md p-2 rounded-full hover:text-orange-600 transition-colors">
              <span class="material-symbols-outlined">favorite</span>
            </button>
          </div>
          <div class="p-8 flex flex-col flex-grow">
            <div class="flex justify-between items-start mb-2">
              <div>
                <span class="text-[12px] font-black uppercase tracking-[0.2em] text-orange-600">${adoption.breed || adoption.type}</span>
                <h3 class="text-2xl font-extrabold tracking-tight">${adoption.name}</h3>
              </div>
              <div class="text-right">
                <span class="text-[12px] font-black uppercase tracking-widest block">${adoption.age}</span>
                <span class="text-[12px] text-stone-400 font-bold uppercase tracking-widest block">${adoption.gender}</span>
              </div>
            </div>
            <p class="text-stone-600 text-sm leading-relaxed mb-6 italic">
              "${adoption.headline}"
            </p>
            <div class="space-y-3 mb-8">
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined ${adoption.vaccinationStatus === 'Yes' ? 'text-tertiary' : 'text-stone-400'} text-[18px]">verified</span>
                <span class="text-[12px] font-bold text-on-surface-variant">${adoption.vaccinationStatus === 'Yes' ? 'Fully Vaccinated' : 'Vaccination Pending'}</span>
              </div>
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined ${adoption.spayedNeutered === 'Yes' ? 'text-tertiary' : 'text-stone-400'} text-[18px]">check_circle</span>
                <span class="text-[12px] font-bold text-on-surface-variant">${adoption.spayedNeutered === 'Yes' ? 'Spayed/Neutered' : 'Not Spayed/Neutered'}</span>
              </div>
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-orange-500 text-[18px]">pets</span>
                <span class="text-[12px] font-bold text-on-surface-variant">${adoption.socialCompatibility.join(' & ') || 'Friendly'}</span>
              </div>
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-stone-400 text-[18px]">location_on</span>
                <span class="text-[12px] font-bold text-on-surface-variant">${adoption.location}</span>
              </div>
            </div>
            <button class="mt-auto w-full bg-primary text-white py-4 rounded-full font-black uppercase tracking-[0.2em] text-[12px] shadow-lg hover:shadow-orange-200 transition-all active:scale-95">
              Adopt Now
            </button>
          </div>
        `;
        return div;
      }

      document.getElementById('loadMoreBtn').addEventListener('click', () => {
        currentPage++;
        fetchAdoptions(currentPage);
      });

      // Initial fetch
      fetchAdoptions();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join as a Specialist - ACSP</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f98c06",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112116",
                        "accent-blue": "#e0f2fe",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen">

    <div id="navbar-placeholder"></div>

    <main class="max-w-4xl mx-auto px-6 pt-12">
        <div class="mb-12">
            <h1 class="text-4xl font-black mb-4">Join our <span class="text-primary italic">Specialist Network</span></h1>
            <p class="text-slate-500 dark:text-slate-400 text-lg">Help us provide better healthcare for animals. Apply to become a verified ACSP veterinarian.</p>
        </div>


        <form id="vetJoinForm" class="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-xl shadow-orange-500/5 border border-slate-100 space-y-10">
            <!-- Personal Info -->
            <div class="space-y-6">
                <h3 class="text-xl font-bold flex items-center gap-2 dark:text-white">
                    <span class="material-symbols-outlined text-primary">person</span>
                    Personal Information
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600 ml-2">Full Name</label>
                        <input type="text" id="vetName" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500/20" placeholder="Dr. John Doe">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600 ml-2">Email Address</label>
                        <input type="email" id="vetEmail" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500/20" placeholder="john@example.com">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600 ml-2">Phone Number</label>
                        <input type="tel" id="vetPhone" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500/20" placeholder="+880 1XXX XXXXXX">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600 ml-2">Medical License No.</label>
                        <input type="text" id="vetLicense" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500/20" placeholder="BMVC-XXXXX">
                    </div>
                </div>
            </div>

            <!-- Professional Info -->
            <div class="space-y-6">
                <h3 class="text-xl font-bold flex items-center gap-2 dark:text-white">
                    <span class="material-symbols-outlined text-primary">medical_services</span>
                    Professional Details
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600 ml-2">Clinic/Hospital Name</label>
                        <input type="text" id="clinicName" class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500/20" placeholder="Central Animal Clinic">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600 ml-2">Location (Area, City)</label>
                        <input type="text" id="vetLocation" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500/20" placeholder="Dhanmondi, Dhaka">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600 ml-2">Working Hours</label>
                        <input type="text" id="workingHours" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500/20" placeholder="Sat-Thu, 10am-8pm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600 ml-2">Specializations</label>
                        <div class="flex flex-wrap gap-3 p-4 bg-slate-50 rounded-2xl">
                            <label class="flex items-center gap-2 text-sm font-medium cursor-pointer">
                                <input type="checkbox" name="specialization" value="dogs" class="accent-orange-500"> Dogs
                            </label>
                            <label class="flex items-center gap-2 text-sm font-medium cursor-pointer">
                                <input type="checkbox" name="specialization" value="cats" class="accent-orange-500"> Cats
                            </label>
                            <label class="flex items-center gap-2 text-sm font-medium cursor-pointer">
                                <input type="checkbox" name="specialization" value="birds" class="accent-orange-500"> Birds
                            </label>
                            <label class="flex items-center gap-2 text-sm font-medium cursor-pointer">
                                <input type="checkbox" name="specialization" value="exotic" class="accent-orange-500"> Exotic
                            </label>
                            <label class="flex items-center gap-2 text-sm font-medium cursor-pointer">
                                <input type="checkbox" name="specialization" value="surgery" class="accent-orange-500"> Surgery
                            </label>
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-600 ml-2">Professional Bio</label>
                    <textarea id="vetBio" rows="4" class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-orange-500/20" placeholder="Tell us about your experience..."></textarea>
                </div>
            </div>

            <!-- Uploads -->
            <div class="space-y-6">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-orange-500">image</span>
                    Professional Photo
                </h3>
                <div class="flex items-center justify-center w-full">
                    <label class="flex flex-col items-center justify-center w-full h-48 border-2 border-slate-200 border-dashed rounded-[2rem] cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <span class="material-symbols-outlined text-slate-400 text-4xl mb-2">cloud_upload</span>
                            <p class="mb-2 text-sm text-slate-500 font-bold">Click to upload photo</p>
                            <p class="text-xs text-slate-400">PNG, JPG or JPEG (Max. 5MB)</p>
                        </div>
                        <input type="file" id="vetPhoto" class="hidden" accept="image/*" />
                    </label>
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full py-5 bg-primary text-white font-black rounded-full hover:bg-orange-600 transition-all shadow-xl shadow-primary/20 text-lg">
                    Submit Application
                </button>
            </div>
        </form>
    </main>

    <div id="footer-placeholder" class="mt-20"></div>


    <script src="components.js"></script>
    <script>
        // Automatic API Base detection
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_BASE = isLocal ? 'http://localhost:5000' : '';

        document.getElementById('vetJoinForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();

            formData.append('name', document.getElementById('vetName').value);
            formData.append('email', document.getElementById('vetEmail').value);
            formData.append('phone', document.getElementById('vetPhone').value);
            formData.append('license', document.getElementById('vetLicense').value);
            formData.append('clinicName', document.getElementById('clinicName').value);
            formData.append('location', document.getElementById('vetLocation').value);
            formData.append('workingHours', document.getElementById('workingHours').value);
            formData.append('bio', document.getElementById('vetBio').value);

            const specializations = Array.from(document.querySelectorAll('input[name="specialization"]:checked')).map(cb => cb.value);
            specializations.forEach(spec => formData.append('specialization', spec));

            const photoInput = document.getElementById('vetPhoto');
            if (photoInput.files.length > 0) {
                formData.append('photo', photoInput.files[0]);
            }

            try {
                const response = await fetch(`${API_BASE}/api/vets`, { method: 'POST', body: formData });
                
                let result;
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    result = await response.json();
                } else {
                    const text = await response.text();
                    console.error("Non-JSON response:", text);
                    throw new Error("Server returned an unexpected response format.");
                }

                if (response.ok) {
                    alert('Your application has been received! Our team will verify your credentials and get back to you shortly.');
                    window.location.href = 'vet_directory.html';
                } else {
                    alert('Error: ' + (result.message || 'Something went wrong. Please check your data.'));
                }
            } catch (error) {
                console.error('Submission error:', error);
                alert('Submission failed: ' + error.message);
            }

        });

        // Update upload label on file selection
        document.getElementById('vetPhoto').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            if (fileName) {
                const label = this.parentElement.querySelector('p.font-bold');
                label.textContent = 'Selected: ' + fileName;
                label.classList.add('text-orange-500');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Password Reset Confirmation | ACSP Platform</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f98c06",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112116",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }</script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display overflow-hidden">
<!-- Top Navigation Placeholder -->

<!-- Main Content Area -->
<main class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-[480px] bg-white dark:bg-zinc-900 rounded-xl shadow-xl shadow-primary/5 p-8 md:p-12 text-center border border-primary/10">
<!-- Success Icon Section -->
<div class="mb-8 flex justify-center">
<div class="relative">
<div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full"></div>
<div class="relative size-24 bg-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white !text-5xl">check_circle</span>
</div>
</div>
</div>
<!-- Text Content -->
<h1 class="text-3xl font-bold text-background-dark dark:text-white mb-4 tracking-tight">
                Check your email
            </h1>
<p class="text-zinc-600 dark:text-zinc-400 text-lg leading-relaxed mb-10">
                We've sent a recovery link to your email address. Please follow the instructions to reset your password and regain access to ACSP.
            </p>
<!-- Action Button -->
<div class="space-y-4">
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-full transition-all shadow-md active:scale-[0.98]">
                    Return to Login
                </button>
</div>
<!-- Troubleshooting Section -->
<div class="mt-10 pt-8 border-t border-zinc-100 dark:border-zinc-800">
<p class="text-sm text-zinc-500 dark:text-zinc-500 mb-2">
                    Didn't receive an email?
                </p>
<div class="flex flex-col gap-2">
<p class="text-sm text-zinc-400 italic mb-3">
                        Check your spam folder or
                    </p>
<button class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 transition-all">
                        Resend Recovery Link
                    </button>
</div>
</div>
</div>
</main>
<!-- Visual Element (Optional Decorative Image) -->
<div class="hidden lg:block fixed -bottom-24 -left-24 size-96 bg-primary/10 rounded-full blur-3xl -z-10 opacity-50"></div>
<div class="hidden lg:block fixed -top-24 -right-24 size-96 bg-primary/5 rounded-full blur-3xl -z-10 opacity-50"></div>
<!-- Footer -->

</body></html>

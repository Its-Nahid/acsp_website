<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ACSP - Donation Cancelled</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
      rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#f98c06",
              "background-light": "#f6f8f6",
              "background-dark": "#112116",
            },
            fontFamily: { display: ["Inter"] },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-[#0e1b12] min-h-screen flex flex-col items-center justify-center p-4">
    <div
      class="bg-white dark:bg-background-dark/50 p-10 rounded-2xl shadow-xl text-center max-w-md w-full border border-gray-500/20">
      <div
        class="size-20 bg-gray-100 text-gray-600 rounded-full flex items-center justify-center mx-auto mb-6">
        <span class="material-symbols-outlined text-4xl font-bold">cancel</span>
      </div>
      <h1 class="text-3xl font-black mb-4">Payment Cancelled</h1>
      <p class="text-gray-600 dark:text-gray-400 mb-8 leading-relaxed">
        You have cancelled the donation process. If you encountered any issues,
        please feel free to try again.
      </p>
      <a
        href="donation.html"
        class="inline-block w-full bg-gray-200 text-gray-800 h-14 leading-[56px] rounded-full font-bold text-lg hover:bg-gray-300 transition-all shadow-lg">
        Return to Donation Form
      </a>
    </div>
  </body>
</html>
